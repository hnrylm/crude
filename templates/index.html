<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Todo List</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; background: #f4f4f9; }
        .todo-card { background: white; padding: 20px; border-radius: 8px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .high { border-left: 5px solid #ff4d4d; } /* Red for High */
        .medium { border-left: 5px solid #ffa500; } /* Orange for Medium */
        .low { border-left: 5px solid #2ecc71; } /* Green for Low */
        .task-item { display: flex; justify-content: space-between; padding: 10px; margin: 10px 0; background: #fafafa; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="todo-card">
        <h1>Smart Tasks 🧠</h1>
        
        <!-- The Input Form -->
        <form action="/add" method="POST">
            <input type="text" name="content" placeholder="What needs doing?" required>
            <select name="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <button type="submit">Add</button>
        </form>

        <!-- The Task List -->
        <div id="list">
            {% for task in tasks %}
            <div class="task-item {{ task.priority }}">
                <span>{{ task.content }}</span>
                <small>{{ task.priority|upper }}</small>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
